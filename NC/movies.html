  <script>
    // Add click handlers to all play buttons
    document.querySelectorAll('.movie-overlay button, .movie-overlay-wide button, .video-play-overlay button').forEach(button => {
      button.addEventListener('click', function(e) {
        e.stopPropagation();
        const video = this.closest('[class*="card"]').querySelector('video');
        if (video) {
          if (video.paused) {
            video.play();
          } else {
            video.pause();
          }
        }
      });
    });
  </script>
